<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domains — VaultScan</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">Vault<span>Scan</span></div>
      <div class="logo-sub">SECURITY SCANNER</div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="/"><svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h5v5H2V2zm0 7h5v5H2V9zm7-7h5v5H9V2zm0 7h5v5H9V9z"/></svg>Dashboard</a>
      <a class="nav-item active" href="/domains.html"><svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8 8 0 100 16A8 8 0 008 0zM1.5 8a6.5 6.5 0 0111-4.7c-.9.5-1.6 1.2-2 1.9H6.2a.75.75 0 000 1.5h1.5a8 8 0 00-.2 1.6H3a.75.75 0 000 1.5h4.5c0 .6.1 1.1.2 1.6H6.2a.75.75 0 000 1.5h1.3c.4.7 1.1 1.4 2 1.9A6.5 6.5 0 011.5 8z"/></svg>Domains</a>
      <a class="nav-item" href="/monitoring.html"><svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM8 4a.75.75 0 01.75.75V8H11a.75.75 0 010 1.5H8A.75.75 0 017.25 8.75v-4A.75.75 0 018 4z"/></svg>Monitoring</a>
      <a class="nav-item" href="/account.html"><svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 8a3 3 0 100-6 3 3 0 000 6zm0 1.5c-3 0-5.5 1.6-5.5 3.5v1h11v-1c0-1.9-2.5-3.5-5.5-3.5z"/></svg>Account</a>
    </nav>
  </aside>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title">Domains</span>
      <button class="btn btn-primary btn-sm" onclick="openAdd()">+ Add domain</button>
    </div>
    <div class="content">
      <div class="card">
        <div style="color:var(--muted);font-size:0.86rem;margin-bottom:1rem">
          You can only scan domains you've verified you own. This keeps VaultScan lawful and protects you.
        </div>
        <div id="domains-list"><div style="color:var(--muted)">Loading…</div></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-title">Add a domain</div>
    <div id="add-error" style="display:none;padding:0.6rem 0.9rem;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:6px;color:var(--c-crit);font-size:0.82rem;margin-bottom:1rem"></div>
    <div class="form-group">
      <label>DOMAIN</label>
      <input type="text" id="add-domain" placeholder="example.com" autocomplete="off">
      <div class="input-help">Enter the root domain. Subdomains are covered automatically.</div>
    </div>
    <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.5rem">
      <button class="btn btn-ghost" onclick="closeAdd()">Cancel</button>
      <button class="btn btn-primary" onclick="addDomain()" id="add-btn">Add</button>
    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
  if (!requireAuth()) throw 'no auth';

  async function load() {
    const domains = await API.get('/api/domains');
    const el = document.getElementById('domains-list');
    if (!domains.length) { el.innerHTML = '<div style="color:var(--muted2);font-size:0.86rem">No domains yet. Add one to start scanning.</div>'; return; }
    el.innerHTML = domains.map(d => {
      const token = escHtml(d.token);
      return `<div class="domain-card">
        <div class="domain-head">
          <span class="domain-name">${escHtml(d.domain)}</span>
          <div style="display:flex;gap:0.5rem;align-items:center">
            <span class="verify-badge ${d.verified ? 'yes' : 'no'}">${d.verified ? '✓ verified' : 'pending'}</span>
            ${d.verified ? '' : `<button class="btn btn-primary btn-sm" onclick="verify(${d.id})" id="vbtn-${d.id}">Verify</button>`}
            <button class="btn btn-danger btn-sm" onclick="del(${d.id})">✕</button>
          </div>
        </div>
        ${d.verified ? '' : `<div class="verify-steps">
          Prove ownership with <strong>either</strong> method, then click Verify:
          <div style="margin-top:0.6rem"><strong>Option A — DNS TXT record</strong> on <code style="display:inline">${escHtml(d.domain)}</code>:</div>
          <pre>${token}</pre>
          <div style="margin-top:0.4rem"><strong>Option B — file</strong> at <code style="display:inline">https://${escHtml(d.domain)}/.well-known/vaultscan-verify.txt</code> containing:</div>
          <pre>${token}</pre>
        </div>`}
      </div>`;
    }).join('');
  }

  function openAdd() { document.getElementById('add-modal').classList.add('open'); }
  function closeAdd() { document.getElementById('add-modal').classList.remove('open'); document.getElementById('add-error').style.display = 'none'; }

  async function addDomain() {
    const domain = document.getElementById('add-domain').value.trim();
    if (!domain) return;
    const btn = document.getElementById('add-btn'); btn.disabled = true;
    try { await API.post('/api/domains', { domain }); closeAdd(); document.getElementById('add-domain').value = ''; load(); }
    catch (e) { const el = document.getElementById('add-error'); el.textContent = e.message; el.style.display = 'block'; }
    finally { btn.disabled = false; }
  }

  async function verify(id) {
    const btn = document.getElementById('vbtn-' + id); btn.disabled = true; btn.textContent = 'Checking…';
    try { await API.post(`/api/domains/${id}/verify`, {}); load(); }
    catch (e) { alert(e.message); btn.disabled = false; btn.textContent = 'Verify'; }
  }
  async function del(id) { if (confirm('Remove this domain?')) { await API.del(`/api/domains/${id}`); load(); } }

  document.getElementById('add-modal').addEventListener('click', e => { if (e.target.id === 'add-modal') closeAdd(); });
  load();
</script>
</body>
</html>
