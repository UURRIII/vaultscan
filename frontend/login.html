<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — VaultScan</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark" style="font-size:1.6rem">Vault<span>Scan</span></div>
      <div class="logo-sub">SECURITY SCANNER</div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign in</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Create account</button>
    </div>

    <div id="auth-error" style="display:none;padding:0.6rem 0.9rem;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:6px;color:var(--c-crit);font-size:0.82rem;margin-bottom:1rem"></div>

    <div class="form-group">
      <label>EMAIL</label>
      <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>PASSWORD</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      <div class="input-help" id="pw-help" style="display:none">At least 8 characters.</div>
    </div>

    <button class="btn btn-primary" id="submit-btn" onclick="submitAuth()" style="width:100%;justify-content:center;margin-top:0.5rem">Sign in</button>

    <div style="text-align:center;margin-top:1.25rem;font-size:0.78rem;color:var(--muted2)">
      Only scan domains you own or are authorized to test.
    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
  let mode = 'login';
  if (API.token()) location.href = '/';

  function switchTab(m) {
    mode = m;
    document.getElementById('tab-login').classList.toggle('active', m === 'login');
    document.getElementById('tab-register').classList.toggle('active', m === 'register');
    document.getElementById('submit-btn').textContent = m === 'login' ? 'Sign in' : 'Create account';
    document.getElementById('pw-help').style.display = m === 'register' ? 'block' : 'none';
    document.getElementById('password').autocomplete = m === 'login' ? 'current-password' : 'new-password';
    hideError();
  }
  function showError(msg) { const e = document.getElementById('auth-error'); e.textContent = msg; e.style.display = 'block'; }
  function hideError() { document.getElementById('auth-error').style.display = 'none'; }

  async function submitAuth() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showError('Email and password are required.'); return; }
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = '…';
    hideError();
    try {
      const data = await API.post(`/api/auth/${mode}`, { email, password });
      API.setToken(data.access_token);
      location.href = '/';
    } catch (e) {
      showError(e.message);
      btn.disabled = false;
      btn.textContent = mode === 'login' ? 'Sign in' : 'Create account';
    }
  }

  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') submitAuth(); });
  document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
</script>
</body>
</html>
